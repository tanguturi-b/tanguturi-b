name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.svg

          base: yes
          base_indepth: yes

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_habits: yes
          plugin_habits_charts: no
          plugin_habits_facts: yes
          plugin_habits_days: 7
          plugin_habits_from: 50

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%

          plugin_repositories: yes
          plugin_repositories_featured: lowlighter/metrics

          config_timezone: Asia/Kolkata
          config_display: large

          extras_css: |
            :root {
              --color-canvas-default: #0d1117 !important;
              --color-canvas-subtle: #0d1117 !important;
              --color-fg-default: #ffffff !important;
            }
            body, .metrics-container {
              background-color: #0d1117 !important;
            }
