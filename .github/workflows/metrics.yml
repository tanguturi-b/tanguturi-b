name: Metrics
on:
  # Runs automatically every day at 00:00 UTC
  schedule:
    - cron: "0 0 * * *"
  # Lets you trigger it manually from the Actions tab
  workflow_dispatch:
  # Also runs on every push to your profile repo
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # REQUIRED — a token with "repo" scope (create as a repo secret named METRICS_TOKEN)
          token: ${{ secrets.METRICS_TOKEN }}
          # Where the generated SVG will be committed
          filename: metrics.svg

          # ---- Base stats (repos, followers, stars, forks, watchers) ----
          plugin_base: yes
          plugin_base_indepth: yes

          # ---- Isometric contribution calendar (matches the 3D calendar in the reference) ----
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # ---- Commit activity per time of day / per day of week ----
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_from: 200

          # ---- Most used languages bar + list ----
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%

          # ---- Skills / tech icons (closest equivalent to "Mastered technologies") ----
          plugin_skyline: no

          # ---- Notable repositories / pinned-style project list ----
          plugin_repositories: yes
          plugin_repositories_featured: lowlighter/metrics

          # ---- Optional: only include if you actually deploy a site (PageSpeed needs a live URL) ----
          # plugin_pagespeed: yes
          # plugin_pagespeed_url: https://your-deployed-site.example.com
          # plugin_pagespeed_screenshot: yes

          # ---- Optional: only include if you connect a music service (Spotify/LastFM) ----
          # plugin_music: yes
          # plugin_music_provider: spotify

          # Theme (close to the dark theme in the reference image)
          config_timezone: Asia/Kolkata
          config_display: large
          theme: dark
